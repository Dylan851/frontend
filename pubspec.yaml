name: wildquest_game
description: WildQuest - RPG educativo de animales para niños
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  bonfire: ^3.16.1
  flame: ^1.32.0
  shared_preferences: ^2.2.2
  http: ^1.1.0
  dio: ^5.3.0
  provider: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/player/
    - assets/images/tiles/
    - assets/images/trees/
    - assets/images/animals/
    - assets/images/animals_basic/
    - assets/images/items/
    - assets/maps/
    # Audio de proximidad de animales — añade aquí cuando tengas los sonidos
    # - assets/audio/animals/
